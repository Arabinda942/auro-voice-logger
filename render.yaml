services:
  # ── BACKEND ─────────────────────────────────────────────────
  - type: web
    name: auro-voice-logger-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python seed.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: auro-voice-logger-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11.0

  # ── FRONTEND ────────────────────────────────────────────────
  - type: web
    name: auro-voice-logger-app
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          name: auro-voice-logger-api
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── DATABASE ────────────────────────────────────────────────────
databases:
  - name: auro-voice-logger-db
    databaseName: auro_voice_logger
    user: auro_user
    plan: free
